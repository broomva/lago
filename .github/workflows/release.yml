name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build:
        name: Build ${{ matrix.target }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      artifact_name: lago
                      asset_name: lago-linux-amd64
                    - os: macos-latest
                      target: x86_64-apple-darwin
                      artifact_name: lago
                      asset_name: lago-darwin-amd64
                    - os: macos-14
                      target: aarch64-apple-darwin
                      artifact_name: lago
                      asset_name: lago-darwin-arm64
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc
                      artifact_name: lago.exe
                      asset_name: lago-windows-amd64.exe

        steps:
            - uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Build
              run: cargo build --release --bin lago --target ${{ matrix.target }}

            - name: Rename binary (Unix)
              if: matrix.os != 'windows-latest'
              run: mv target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}

            - name: Rename binary (Windows)
              if: matrix.os == 'windows-latest'
              run: move target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}

            - name: Upload Release Asset
              uses: softprops/action-gh-release@v1
              if: startsWith(github.ref, 'refs/tags/')
              with:
                  files: ${{ matrix.asset_name }}
